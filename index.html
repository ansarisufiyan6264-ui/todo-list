<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random User Generator</title>

    <link rel="stylesheet" href="todo.css">
</head>
<body>
    
    <div class="container">

         <h2 class="title">📝 Todo List</h2>

        <div class="top">
             <!--Input Box-->
            <input type="text" class="int" id="int" placeholder="Add a new task..."><br>
            
    
            <!--Add Button-->
            <button class="btn" id="addBtn">Add</button>
        </div>
        
        <h3 class="count-task" id="taskCounter">Total Tasks: 0</h3>
        <p id="emptyMessage">No tasks yet 🚀</p>

        <!--Inbox list-->
        <ul class="inbox" id="inbox"></ul>
    </div>

    <script src="todo.js"></script>
</body>
</html>
